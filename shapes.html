<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, minimum-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Shape Builder" />
  <meta name="theme-color" content="#f0f0f5" />
  <link rel="apple-touch-icon" href="rocket_book_logo.png?v=12" />
  <link rel="icon" type="image/png" sizes="192x192" href="rocket_book_logo.png?v=12" />
  <title>Shape Builder</title>
  <style>
    :root {
      --bg: #f0f0f5; --glass: rgba(255,255,255,0.55); --glass-border: rgba(255,255,255,0.65);
      --glass-shadow: 0 8px 32px rgba(0,0,0,0.08); --text: #1a1a2e; --muted: #6b7085; --blur: 28px; --radius: 24px;
    }
    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; margin: 0; padding: 0; }
    html, body {
  width: 100%; height: 100%; height: 100dvh;
  overflow: hidden; position: fixed;
  touch-action: none;
}
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Helvetica Neue', Arial, sans-serif;
      color: var(--text); height: 100vh; height: 100dvh;
      display: flex; align-items: stretch; justify-content: center;
      padding: max(14px, env(safe-area-inset-top)) max(14px, env(safe-area-inset-right)) max(20px, env(safe-area-inset-bottom)) max(14px, env(safe-area-inset-left));
      user-select: none; -webkit-user-select: none; overflow: hidden;
      background:
        radial-gradient(ellipse at 20% 0%, rgba(253,186,116,0.28), transparent 50%),
        radial-gradient(ellipse at 80% 5%, rgba(249,115,22,0.22), transparent 45%),
        radial-gradient(ellipse at 50% 95%, rgba(139,92,246,0.16), transparent 40%),
        var(--bg);
    }
    .app, button, img { touch-action: manipulation; }
    .app {
      width: 100%; max-width: 420px; height: 100%;
      background: var(--glass); backdrop-filter: blur(var(--blur)) saturate(1.6);
      -webkit-backdrop-filter: blur(var(--blur)) saturate(1.6);
      border-radius: 0; box-shadow: var(--glass-shadow), inset 0 1px 0 rgba(255,255,255,0.6);
      padding: 20px 18px 24px 18px; display: flex; flex-direction: column; align-items: center;
      position: relative; overflow: hidden; border: 1px solid var(--glass-border);
    }
    .app::before { content: ""; position: absolute; inset: 0; pointer-events: none; background: linear-gradient(180deg, rgba(255,255,255,0.35) 0%, transparent 40%); border-radius: 36px; }

    .screen { display: none; flex-direction: column; flex: 1; overflow: hidden; }
    .screen.active { display: flex; }
    .topbar { width: 100%; display: flex; align-items: center; justify-content: space-between; padding: 0 4px; margin-bottom: 8px; min-height: 36px; position: relative; z-index: 1; }
    .topbar-title { font-size: 15px; font-weight: 800; }
    .topbar-progress { font-size: 13px; font-weight: 700; color: var(--muted); }

    .home-icon { font-size: 64px; margin-bottom: 8px; }
    .home-title { font-size: clamp(28px, 8vw, 42px); font-weight: 900; margin-bottom: 4px; }
    .home-subtitle { font-size: 16px; font-weight: 600; color: var(--muted); margin-bottom: 20px; }

    .progress-dots { display: flex; gap: 6px; justify-content: center; margin-bottom: 14px; }
    .dot { width: 10px; height: 10px; border-radius: 50%; background: rgba(0,0,0,0.08); transition: background 0.3s, transform 0.3s; }
    .dot.done { background: #f97316; transform: scale(1.15); }
    .dot.current { background: rgba(249,115,22,0.4); animation: dotPulse 1.2s ease-in-out infinite; }
    @keyframes dotPulse { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.3); } }

    /* Shape display area */
    .shape-display {
      width: min(140px, 35vw); height: min(140px, 35vw);
      display: flex; align-items: center; justify-content: center;
      margin-bottom: 10px; position: relative;
    }
    .shape-outline {
      position: absolute; inset: 0;
      display: flex; align-items: center; justify-content: center;
    }
    .shape-outline svg { width: 140px; height: 140px; }
    .shape-outline svg .outline-path {
      fill: none; stroke: rgba(0,0,0,0.1); stroke-width: 3; stroke-dasharray: 8 6;
    }
    .shape-filled {
      position: absolute; inset: 0;
      display: flex; align-items: center; justify-content: center;
      opacity: 0; transform: scale(0.8);
      transition: opacity 0.5s ease, transform 0.5s cubic-bezier(0.34, 1.56, 0.64, 1);
    }
    .shape-filled.show { opacity: 1; transform: scale(1); }
    .shape-filled svg { width: 140px; height: 140px; }

    .prompt-text { font-size: 16px; font-weight: 700; color: var(--muted); margin-bottom: 6px; min-height: 24px; }
    .transform-text { font-size: 14px; font-weight: 700; color: #f97316; margin-bottom: 14px; min-height: 20px; }

    /* Shape choices */
    .shape-choices {
      display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 12px;
      width: 100%; max-width: 300px;
    }
    .shape-btn {
      border: none; outline: none; cursor: pointer;
      border-radius: 20px; padding: 16px 8px;
      display: flex; flex-direction: column; align-items: center; gap: 6px;
      background: rgba(255,255,255,0.7); backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px);
      border: 2px solid rgba(0,0,0,0.04); box-shadow: 0 4px 14px rgba(0,0,0,0.06);
      transition: transform 0.15s ease, border-color 0.2s ease; position: relative; overflow: hidden;
    }
    .shape-btn::before { content: ""; position: absolute; inset: 0; pointer-events: none; background: linear-gradient(160deg, rgba(255,255,255,0.5) 0%, transparent 50%); border-radius: 20px; }
    .shape-btn:active { transform: scale(0.94); }
    .shape-btn svg { width: 50px; height: 50px; position: relative; z-index: 1; }
    .shape-btn .shape-label { font-size: 11px; font-weight: 700; color: var(--muted); position: relative; z-index: 1; }
    .shape-btn.correct { border-color: #22c55e; background: rgba(34,197,94,0.15); box-shadow: 0 0 20px rgba(34,197,94,0.3); animation: correctBounce 0.5s ease; }
    .shape-btn.wrong { border-color: rgba(239,68,68,0.3); animation: wrongShake 0.4s ease; }
    @keyframes correctBounce { 0% { transform: scale(1); } 30% { transform: scale(1.1); } 100% { transform: scale(1); } }
    @keyframes wrongShake { 0%,100% { transform: translateX(0); } 20% { transform: translateX(-6px); } 40% { transform: translateX(6px); } 60% { transform: translateX(-4px); } 80% { transform: translateX(4px); } }

    .speaker-btn {
      border: none; outline: none; cursor: pointer;
      background: rgba(249,115,22,0.12); border-radius: 50%; width: 44px; height: 44px;
      display: flex; align-items: center; justify-content: center;
      font-size: 22px; margin-bottom: 10px; transition: transform 0.15s ease;
      border: 1px solid rgba(249,115,22,0.15);
    }
    .speaker-btn:active { transform: scale(0.9); }

    .glass-btn {
      border: none; outline: none; cursor: pointer; border-radius: 16px; padding: 14px 32px;
      font-size: 16px; font-weight: 800; backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px);
      transition: transform 0.12s ease; position: relative; overflow: hidden;
    }
    .glass-btn:active { transform: scale(0.96); }
    .glass-btn::before { content: ""; position: absolute; inset: 0; pointer-events: none; background: linear-gradient(160deg, rgba(255,255,255,0.4) 0%, transparent 50%); border-radius: 16px; }
    .btn-primary { background: linear-gradient(145deg, rgba(253,186,116,0.85), rgba(249,115,22,0.9)); color: #fff; box-shadow: 0 6px 18px rgba(249,115,22,0.3); border: 1px solid rgba(253,186,116,0.4); }
    .btn-neutral { background: rgba(0,0,0,0.05); color: var(--text); box-shadow: 0 2px 8px rgba(0,0,0,0.06); border: 1px solid rgba(0,0,0,0.04); }
    .btn-row { display: flex; gap: 10px; margin-top: 16px; }

    .result-title { font-size: clamp(28px, 8vw, 44px); font-weight: 900; margin-bottom: 6px; }
    .result-stats { font-size: 17px; font-weight: 700; color: #f97316; margin-bottom: 6px; }
    .result-text { font-size: 14px; color: var(--muted); margin-bottom: 10px; max-width: 280px; }
    .celebration-img { width: min(44vw, 160px); height: auto; max-height: 160px; object-fit: cover; border-radius: 20px; box-shadow: 0 8px 24px rgba(0,0,0,0.12); margin-bottom: 8px; }

    @media (max-width: 390px) {
      .shape-display { width: 130px; height: 130px; }
      .shape-outline svg, .shape-filled svg { width: 110px; height: 110px; }
      .shape-choices { gap: 10px; max-width: 280px; }
      .shape-btn svg { width: 42px; height: 42px; }
    }

    .install-banner {
      position: fixed; bottom: 0; left: 0; right: 0;
      background: rgba(0,0,0,0.85); color: #fff;
      padding: 14px 20px; text-align: center;
      font-size: 14px; z-index: 9999;
      backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px);
      display: none;
    }
    .install-banner b { color: #6ee7b7; }
    .install-banner .close-banner { position: absolute; top: 8px; right: 12px; color: #fff; background: none; border: none; font-size: 20px; cursor: pointer; }
  </style>
</head>
<body>
  <div class="app">
    <div class="topbar">
      <span class="topbar-title">Shape Builder</span>
      <span class="topbar-progress" id="topProgress"></span>
    </div>

    <div class="screen active" id="homeScreen">
      <div class="home-icon">&#x1F4A0;</div>
      <div class="home-title">Shape Builder</div>
      <div class="home-subtitle">Match the shape!</div>
      <button class="glass-btn btn-primary" id="startBtn" type="button">Let's Build!</button>
      <div class="btn-row">
        <button class="glass-btn btn-neutral" onclick="window.location.href='index.html'" type="button">Home</button>
      </div>
    </div>

    <div class="screen" id="gameScreen">
      <div class="progress-dots" id="progressDots"></div>
      <button class="speaker-btn" id="speakerBtn" type="button">&#x1F50A;</button>
      <div class="shape-display">
        <div class="shape-outline" id="shapeOutline"></div>
        <div class="shape-filled" id="shapeFilled"></div>
      </div>
      <div class="prompt-text" id="promptText">Tap the shape!</div>
      <div class="transform-text" id="transformText"></div>
      <div class="shape-choices" id="shapeChoices"></div>
    </div>

    <div class="screen" id="finishScreen">
      <div class="result-title">Shape Star!</div>
      <div class="result-stats" id="resultStats"></div>
      <div class="result-text">You know your shapes! Awesome!</div>
      <img id="celebrationImg" class="celebration-img" src="giphy.gif" alt="Celebration" />
      <div class="btn-row">
        <button class="glass-btn btn-neutral" onclick="window.location.href='index.html'" type="button">Home</button>
        <button class="glass-btn btn-primary" id="playAgainBtn" type="button">Play Again</button>
      </div>
    </div>
  </div>

  <div class="install-banner" id="installBanner">
  <button class="close-banner" onclick="document.getElementById('installBanner').style.display='none';localStorage.setItem('bannerDismissed','1')">&times;</button>
  Tap <b>Share &#x2191;</b> then <b>Add to Home Screen</b> for the best experience!
</div>

  <audio id="correctSound" preload="auto"><source src="correct.mp3" type="audio/mpeg"></audio>
  <audio id="celebrationSound" preload="auto"><source src="celebration_sound.mp3" type="audio/mpeg"></audio>

  <script>
    const shapes = [
      { name: "Circle", color: "#ef4444", funFact: "Round like a cookie!",
        outline: '<svg viewBox="0 0 100 100"><circle class="outline-path" cx="50" cy="50" r="40"/></svg>',
        filled: '<svg viewBox="0 0 100 100"><circle cx="50" cy="50" r="40" fill="#ef4444" opacity="0.85"/></svg>',
        choice: '<svg viewBox="0 0 100 100"><circle cx="50" cy="50" r="40" fill="#ef4444" opacity="0.85"/></svg>' },
      { name: "Square", color: "#3b82f6", funFact: "Like a window!",
        outline: '<svg viewBox="0 0 100 100"><rect class="outline-path" x="15" y="15" width="70" height="70" rx="4"/></svg>',
        filled: '<svg viewBox="0 0 100 100"><rect x="15" y="15" width="70" height="70" rx="4" fill="#3b82f6" opacity="0.85"/></svg>',
        choice: '<svg viewBox="0 0 100 100"><rect x="15" y="15" width="70" height="70" rx="4" fill="#3b82f6" opacity="0.85"/></svg>' },
      { name: "Triangle", color: "#22c55e", funFact: "Like a slice of pizza!",
        outline: '<svg viewBox="0 0 100 100"><polygon class="outline-path" points="50,10 90,85 10,85"/></svg>',
        filled: '<svg viewBox="0 0 100 100"><polygon points="50,10 90,85 10,85" fill="#22c55e" opacity="0.85"/></svg>',
        choice: '<svg viewBox="0 0 100 100"><polygon points="50,10 90,85 10,85" fill="#22c55e" opacity="0.85"/></svg>' },
      { name: "Star", color: "#f59e0b", funFact: "Like a star in the sky!",
        outline: '<svg viewBox="0 0 100 100"><polygon class="outline-path" points="50,5 61,35 95,35 68,55 79,90 50,68 21,90 32,55 5,35 39,35"/></svg>',
        filled: '<svg viewBox="0 0 100 100"><polygon points="50,5 61,35 95,35 68,55 79,90 50,68 21,90 32,55 5,35 39,35" fill="#f59e0b" opacity="0.85"/></svg>',
        choice: '<svg viewBox="0 0 100 100"><polygon points="50,5 61,35 95,35 68,55 79,90 50,68 21,90 32,55 5,35 39,35" fill="#f59e0b" opacity="0.85"/></svg>' },
      { name: "Heart", color: "#ec4899", funFact: "Like a valentine!",
        outline: '<svg viewBox="0 0 100 100"><path class="outline-path" d="M50 88 C25 65 5 50 5 30 C5 15 17 5 30 5 C38 5 45 10 50 18 C55 10 62 5 70 5 C83 5 95 15 95 30 C95 50 75 65 50 88Z"/></svg>',
        filled: '<svg viewBox="0 0 100 100"><path d="M50 88 C25 65 5 50 5 30 C5 15 17 5 30 5 C38 5 45 10 50 18 C55 10 62 5 70 5 C83 5 95 15 95 30 C95 50 75 65 50 88Z" fill="#ec4899" opacity="0.85"/></svg>',
        choice: '<svg viewBox="0 0 100 100"><path d="M50 88 C25 65 5 50 5 30 C5 15 17 5 30 5 C38 5 45 10 50 18 C55 10 62 5 70 5 C83 5 95 15 95 30 C95 50 75 65 50 88Z" fill="#ec4899" opacity="0.85"/></svg>' },
      { name: "Diamond", color: "#8b5cf6", funFact: "Like a kite!",
        outline: '<svg viewBox="0 0 100 100"><polygon class="outline-path" points="50,5 90,50 50,95 10,50"/></svg>',
        filled: '<svg viewBox="0 0 100 100"><polygon points="50,5 90,50 50,95 10,50" fill="#8b5cf6" opacity="0.85"/></svg>',
        choice: '<svg viewBox="0 0 100 100"><polygon points="50,5 90,50 50,95 10,50" fill="#8b5cf6" opacity="0.85"/></svg>' },
    ];

    const ROUND_COUNT = 6;
    const GIPHY_API_KEY = "kIyJEsGiHN0LpmsNMaYm8SXyj4p2rZjm";
    const GIPHY_TAGS = ["great job animated cartoon", "gold star cartoon", "you did it animated", "confetti celebration animated", "thumbs up cartoon cute", "hooray cartoon", "super star animated sticker", "well done animated cute"];
    let giphyCache = [];

    let deck = [], index = 0, correctCount = 0, waiting = false;
    const correctSound = document.getElementById("correctSound");
    const celebrationSound = document.getElementById("celebrationSound");

    let bestVoice = null;
    function findBestVoice() {
      const voices = window.speechSynthesis.getVoices();
      if (!voices.length) return;
      const prefs = ["samantha", "zoe", "karen", "fiona", "allison", "ava", "susan"];
      for (const pref of prefs) {
        const v = voices.find(v => v.name.toLowerCase().includes(pref) && v.lang.startsWith("en"));
        if (v) { bestVoice = v; return; }
      }
      const english = voices.filter(v => v.lang.startsWith("en") && !v.name.toLowerCase().includes("alex"));
      if (english.length) bestVoice = english[0];
    }
    if ("speechSynthesis" in window) { findBestVoice(); window.speechSynthesis.onvoiceschanged = findBestVoice; }

    function speak(text, rate) {
      if (!("speechSynthesis" in window)) return;
      window.speechSynthesis.cancel();
      const u = new SpeechSynthesisUtterance(text);
      u.rate = rate || 0.85; u.pitch = 1.05; u.lang = "en-US";
      if (bestVoice) u.voice = bestVoice;
      window.speechSynthesis.speak(u);
    }

    function shuffle(arr) { for (let i = arr.length - 1; i > 0; i--) { const j = Math.floor(Math.random() * (i + 1)); [arr[i], arr[j]] = [arr[j], arr[i]]; } return arr; }

    async function preloadGiphyCache() {
      try {
        const tag = GIPHY_TAGS[Math.floor(Math.random() * GIPHY_TAGS.length)];
        const url = `https://api.giphy.com/v1/stickers/search?api_key=${GIPHY_API_KEY}&q=${encodeURIComponent(tag)}&rating=g&limit=25&offset=${Math.floor(Math.random() * 50)}`;
        const res = await fetch(url); const data = await res.json();
        if (data.data && data.data.length > 0) giphyCache = data.data.map(g => g.images.fixed_height.url);
      } catch (e) {}
    }
    async function getRandomCelebrationGif() {
      if (giphyCache.length > 0) { const gif = giphyCache.splice(Math.floor(Math.random() * giphyCache.length), 1)[0]; if (giphyCache.length < 5) preloadGiphyCache(); return gif; }
      try { const tag = GIPHY_TAGS[Math.floor(Math.random() * GIPHY_TAGS.length)]; const url = `https://api.giphy.com/v1/stickers/random?api_key=${GIPHY_API_KEY}&tag=${encodeURIComponent(tag)}&rating=g`; const res = await fetch(url); const data = await res.json(); if (data.data && data.data.images) return data.data.images.fixed_height.url; } catch (e) {}
      return "giphy.gif";
    }

    function showScreen(id) { document.querySelectorAll(".screen").forEach(s => s.classList.remove("active")); document.getElementById(id).classList.add("active"); }

    function buildDots() {
      const c = document.getElementById("progressDots"); c.innerHTML = "";
      for (let i = 0; i < ROUND_COUNT; i++) { const d = document.createElement("div"); d.className = "dot" + (i < index ? " done" : "") + (i === index ? " current" : ""); c.appendChild(d); }
    }

    function showRound() {
      if (index >= ROUND_COUNT) { finishGame(); return; }
      waiting = false;
      const shape = deck[index];
      document.getElementById("topProgress").textContent = (index + 1) + " of " + ROUND_COUNT;
      document.getElementById("shapeOutline").innerHTML = shape.outline;
      document.getElementById("shapeFilled").innerHTML = shape.filled;
      document.getElementById("shapeFilled").classList.remove("show");
      document.getElementById("promptText").textContent = "Find the " + shape.name + "!";
      document.getElementById("transformText").textContent = "";
      buildDots();

      // Build choices: correct + 2 wrongs
      const wrongs = shapes.filter(s => s.name !== shape.name);
      const picks = shuffle(wrongs).slice(0, 2);
      const allChoices = shuffle([{ ...shape, isCorrect: true }, ...picks.map(p => ({ ...p, isCorrect: false }))]);

      const container = document.getElementById("shapeChoices");
      container.innerHTML = "";
      allChoices.forEach(c => {
        const btn = document.createElement("button");
        btn.className = "shape-btn"; btn.type = "button";
        btn.innerHTML = c.choice + '<span class="shape-label">' + c.name + '</span>';
        btn.addEventListener("click", () => handleChoice(btn, c, shape));
        container.appendChild(btn);
      });

      setTimeout(() => { speak("Can you find the " + shape.name + "? Tap the " + shape.name + "!", 0.85); }, 300);
    }

    function handleChoice(btn, choice, target) {
      if (waiting) return;
      if (choice.isCorrect) {
        waiting = true; correctCount++;
        btn.classList.add("correct");
        document.getElementById("shapeFilled").classList.add("show");
        correctSound.currentTime = 0; correctSound.play().catch(() => {});
        document.getElementById("promptText").textContent = "That's a " + target.name + "!";
        document.getElementById("transformText").textContent = target.funFact;
        speak("Yes! That's a " + target.name + "! " + target.funFact, 0.9);
        setTimeout(() => { index++; showRound(); }, 2200);
      } else {
        btn.classList.add("wrong");
        speak("That's a " + choice.name + ". Try the " + target.name + "!", 0.9);
        setTimeout(() => { btn.classList.remove("wrong"); }, 600);
      }
    }

    function finishGame() {
      document.getElementById("topProgress").textContent = "";
      document.getElementById("resultStats").textContent = correctCount + " of " + ROUND_COUNT + " shapes found!";
      getRandomCelebrationGif().then(src => { document.getElementById("celebrationImg").src = src; });
      showScreen("finishScreen");
      celebrationSound.currentTime = 0; celebrationSound.play().catch(() => {});
      speak("Shape Star! You found all the shapes! Amazing job!", 0.9);
      try { const r=JSON.parse(localStorage.getItem('rocketBookReports')||'[]'); r.push({game:'Shape Builder',date:new Date().toISOString(),correct:correctCount,total:ROUND_COUNT}); localStorage.setItem('rocketBookReports',JSON.stringify(r)); } catch(e){}
    }

    function startGame() { deck = shuffle([...shapes]).slice(0, ROUND_COUNT); index = 0; correctCount = 0; showScreen("gameScreen"); showRound(); }

    document.getElementById("speakerBtn").addEventListener("click", () => { if (index < deck.length) speak("Find the " + deck[index].name + "!", 0.85); });
    document.getElementById("startBtn").addEventListener("click", startGame);
    document.getElementById("playAgainBtn").addEventListener("click", startGame);
    preloadGiphyCache();

    // Lock down touch for young children
    document.addEventListener('touchmove', function(e) {
      if (!e.target.closest('.scrollable')) e.preventDefault();
    }, { passive: false });
    document.addEventListener('gesturestart', function(e) { e.preventDefault(); });
    document.addEventListener('gesturechange', function(e) { e.preventDefault(); });
    // Show install banner on iOS Safari
    if (/iPhone|iPad/.test(navigator.userAgent) && !window.navigator.standalone && !localStorage.getItem('bannerDismissed')) {
      setTimeout(function() { document.getElementById('installBanner').style.display = 'block'; }, 2000);
    }
  </script>
</body>
</html>
