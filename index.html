<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, minimum-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Rocket Book" />
  <meta name="theme-color" content="#f0f0f5" />
  <link rel="apple-touch-icon" href="rocket_book_logo.png?v=12" />
  <link rel="icon" type="image/png" sizes="192x192" href="rocket_book_logo.png?v=12" />
  <link rel="shortcut icon" href="rocket_book_logo.png?v=12" />
  <title>Rocket Book Games</title>
  <style>
    :root {
      --bg: #f0f0f5;
      --glass: rgba(255,255,255,0.55);
      --glass-border: rgba(255,255,255,0.65);
      --glass-shadow: 0 8px 32px rgba(0,0,0,0.08);
      --text: #1a1a2e;
      --muted: #6b7085;
      --blur: 28px;
      --radius: 24px;
    }

    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; margin: 0; padding: 0; }

    html, body {
      width: 100%; height: 100%; height: 100dvh;
      overflow: hidden; position: fixed;
      touch-action: none;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'SF Pro Text', 'Helvetica Neue', Arial, sans-serif;
      color: var(--text);
      height: 100vh; height: 100dvh;
      display: flex; align-items: stretch; justify-content: center;
      padding: max(14px, env(safe-area-inset-top)) max(14px, env(safe-area-inset-right)) max(20px, env(safe-area-inset-bottom)) max(14px, env(safe-area-inset-left));
      user-select: none; -webkit-user-select: none;
      -webkit-text-size-adjust: 100%;
      overflow: hidden;
      background:
        radial-gradient(ellipse at 20% 0%, rgba(147,130,255,0.25), transparent 50%),
        radial-gradient(ellipse at 80% 5%, rgba(59,180,246,0.20), transparent 45%),
        radial-gradient(ellipse at 10% 95%, rgba(251,146,60,0.18), transparent 40%),
        radial-gradient(ellipse at 85% 90%, rgba(236,72,153,0.16), transparent 40%),
        radial-gradient(ellipse at 50% 50%, rgba(20,184,166,0.08), transparent 50%),
        var(--bg);
    }

    .app, button, img, a { touch-action: manipulation; }

    .app {
      width: 100%; max-width: 420px;
      height: 100%;
      background: var(--glass);
      backdrop-filter: blur(var(--blur)) saturate(1.6);
      -webkit-backdrop-filter: blur(var(--blur)) saturate(1.6);
      border-radius: 0;
      box-shadow: var(--glass-shadow), inset 0 1px 0 rgba(255,255,255,0.6);
      padding: 12px 20px 10px 20px;
      display: flex; flex-direction: column; align-items: center;
      justify-content: space-evenly;
      position: relative; overflow: hidden;
      border: 1px solid var(--glass-border);
    }

    .app::before {
      content: ""; position: absolute; inset: 0; pointer-events: none;
      background: linear-gradient(180deg, rgba(255,255,255,0.35) 0%, transparent 40%);
      border-radius: 0;
    }

    .screen { display: none; flex-direction: column; flex: 1; overflow: hidden; }
    .screen.active { display: flex; }

    .brand-logo {
      width: min(22vw, 76px); height: auto;
      margin: 0 0 8px 0; object-fit: contain;
      filter: drop-shadow(0 6px 16px rgba(0,0,0,0.10));
      animation: logoFloat 4s ease-in-out infinite;
    }
    @keyframes logoFloat {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-4px); }
    }

    .app-title {
      font-size: clamp(26px, 7vw, 38px);
      font-weight: 800; line-height: 1.06;
      letter-spacing: -0.5px; margin-bottom: 10px;
    }

    /* ===== iOS Segmented Control Toggle ===== */
    .age-toggle-wrap {
      width: 100%; max-width: 260px;
      margin-bottom: 10px;
    }
    .age-toggle {
      display: grid; grid-template-columns: 1fr 1fr;
      background: rgba(0,0,0,0.06);
      border-radius: 12px; padding: 3px;
      position: relative;
    }
    .age-toggle-slider {
      position: absolute; top: 3px; left: 3px;
      width: calc(50% - 3px); height: calc(100% - 6px);
      background: #fff;
      border-radius: 9px;
      box-shadow: 0 1px 6px rgba(0,0,0,0.10), 0 1px 2px rgba(0,0,0,0.06);
      transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      z-index: 0;
    }
    .age-toggle.elc .age-toggle-slider {
      transform: translateX(100%);
    }
    .age-toggle label {
      position: relative; z-index: 1;
      padding: 8px 0; font-size: 13px; font-weight: 700;
      text-align: center; cursor: pointer;
      color: var(--muted);
      transition: color 0.25s ease;
      border-radius: 9px;
      display: flex; align-items: center; justify-content: center; gap: 4px;
    }
    .age-toggle label .toggle-emoji { font-size: 15px; }
    .age-toggle input { display: none; }
    .age-toggle label.active { color: var(--text); }

    .age-subtitle {
      font-size: 12px; font-weight: 600;
      color: var(--muted); margin-bottom: 14px;
      min-height: 16px;
      transition: opacity 0.2s ease;
    }

    /* ===== Game Tiles ===== */
    .game-grid {
      width: 100%; max-width: 310px;
      display: grid; grid-template-columns: 1fr 1fr;
      gap: 10px;
    }

    .game-tile {
      border: none; outline: none;
      border-radius: var(--radius);
      padding: 18px 10px 16px 10px;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      gap: 5px; text-align: center;
      cursor: pointer;
      position: relative; overflow: hidden;
      transition: transform 0.12s ease, box-shadow 0.2s ease;
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
    }
    .game-tile:active { transform: scale(0.95); }

    .game-tile::before {
      content: ""; position: absolute; inset: 0; pointer-events: none;
      border-radius: var(--radius);
      background: linear-gradient(160deg, rgba(255,255,255,0.45) 0%, transparent 50%);
    }
    .game-tile::after {
      content: ""; position: absolute; inset: 0; pointer-events: none;
      border-radius: var(--radius);
      box-shadow: inset 0 1px 1px rgba(255,255,255,0.5), inset 0 -1px 1px rgba(0,0,0,0.03);
    }

    .tile-icon { font-size: 34px; line-height: 1; filter: drop-shadow(0 2px 4px rgba(0,0,0,0.08)); }
    .tile-name { font-size: 13px; font-weight: 800; line-height: 1.15; position: relative; z-index: 1; }
    .tile-desc { font-size: 10.5px; font-weight: 600; line-height: 1.2; opacity: 0.7; position: relative; z-index: 1; }

    /* 1st Grade tile colors */
    .tile-fast {
      background: linear-gradient(145deg, rgba(110,231,183,0.85), rgba(16,185,129,0.9));
      color: #064e3b; box-shadow: 0 6px 18px rgba(16,185,129,0.25);
      border: 1px solid rgba(110,231,183,0.5);
    }
    .tile-rainbow {
      background: linear-gradient(145deg, rgba(253,230,138,0.85), rgba(245,158,11,0.9));
      color: #78350f; box-shadow: 0 6px 18px rgba(245,158,11,0.25);
      border: 1px solid rgba(253,230,138,0.5);
    }
    .tile-spelling {
      background: linear-gradient(145deg, rgba(252,211,77,0.85), rgba(217,119,6,0.9));
      color: #451a03; box-shadow: 0 6px 18px rgba(217,119,6,0.25);
      border: 1px solid rgba(252,211,77,0.5);
    }
    .tile-brain {
      background: linear-gradient(145deg, rgba(103,232,249,0.85), rgba(6,182,212,0.9));
      color: #083344; box-shadow: 0 6px 18px rgba(6,182,212,0.25);
      border: 1px solid rgba(103,232,249,0.5);
    }

    /* ELC tile colors — softer pastels */
    .tile-letters {
      background: linear-gradient(145deg, rgba(196,181,253,0.8), rgba(139,92,246,0.85));
      color: #3b0764; box-shadow: 0 6px 18px rgba(139,92,246,0.22);
      border: 1px solid rgba(196,181,253,0.5);
    }
    .tile-counting {
      background: linear-gradient(145deg, rgba(110,231,183,0.8), rgba(52,211,153,0.85));
      color: #064e3b; box-shadow: 0 6px 18px rgba(52,211,153,0.22);
      border: 1px solid rgba(110,231,183,0.5);
    }
    .tile-shapes {
      background: linear-gradient(145deg, rgba(253,186,116,0.8), rgba(249,115,22,0.85));
      color: #7c2d12; box-shadow: 0 6px 18px rgba(249,115,22,0.22);
      border: 1px solid rgba(253,186,116,0.5);
    }
    .tile-colors {
      background: linear-gradient(145deg, rgba(252,165,165,0.8), rgba(239,68,68,0.82));
      color: #7f1d1d; box-shadow: 0 6px 18px rgba(239,68,68,0.20);
      border: 1px solid rgba(252,165,165,0.5);
    }

    /* Tile entrance animation */
    .game-grid .game-tile {
      opacity: 0; transform: translateY(12px) scale(0.96);
      animation: tileIn 0.35s ease forwards;
    }
    .game-grid .game-tile:nth-child(1) { animation-delay: 0.04s; }
    .game-grid .game-tile:nth-child(2) { animation-delay: 0.10s; }
    .game-grid .game-tile:nth-child(3) { animation-delay: 0.16s; }
    .game-grid .game-tile:nth-child(4) { animation-delay: 0.22s; }
    @keyframes tileIn {
      to { opacity: 1; transform: translateY(0) scale(1); }
    }

    .footer {
      margin-top: 14px;
      display: flex; flex-direction: column; align-items: center; gap: 2px;
    }
    .micro-note { font-size: 11px; line-height: 1.35; color: var(--muted); }
    .credit-link { color: inherit; text-decoration: none; font-weight: 700; }
    .credit-link:hover { text-decoration: underline; }

    @media (max-width: 390px) {
      .brand-logo { width: min(26vw, 70px); }
      .game-grid { max-width: 290px; gap: 9px; }
      .game-tile { padding: 16px 8px 14px 8px; border-radius: 20px; }
      .tile-icon { font-size: 30px; }
      .tile-name { font-size: 12.5px; }
    }

    .reports-btn {
      background: rgba(0,0,0,0.05); border: none; border-radius: 12px;
      padding: 6px 14px; font-size: 12px; font-weight: 700; color: var(--muted);
      cursor: pointer; margin-top: 4px;
      backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px);
    }
    .reports-btn:active { transform: scale(0.95); }
    .reports-overlay {
      display: none; position: fixed; inset: 0; z-index: 9998;
      background: rgba(0,0,0,0.4);
      backdrop-filter: blur(6px); -webkit-backdrop-filter: blur(6px);
      align-items: center; justify-content: center; padding: 20px;
    }
    .reports-overlay.open { display: flex; }
    .reports-modal {
      background: rgba(255,255,255,0.92);
      backdrop-filter: blur(24px); -webkit-backdrop-filter: blur(24px);
      border-radius: 24px; width: 100%; max-width: 380px;
      max-height: 80dvh; display: flex; flex-direction: column;
      box-shadow: 0 16px 48px rgba(0,0,0,0.15);
      border: 1px solid rgba(255,255,255,0.6); overflow: hidden;
    }
    .reports-header { padding: 16px 20px 12px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid rgba(0,0,0,0.06); }
    .reports-header h2 { font-size: 18px; font-weight: 800; margin: 0; }
    .reports-close { background: rgba(0,0,0,0.06); border: none; border-radius: 50%; width: 30px; height: 30px; font-size: 16px; cursor: pointer; display: flex; align-items: center; justify-content: center; }
    .reports-body { flex: 1; overflow-y: auto; -webkit-overflow-scrolling: touch; padding: 12px 20px 16px; }
    .reports-body.scrollable { touch-action: pan-y; }
    .report-card { background: rgba(0,0,0,0.03); border-radius: 14px; padding: 12px 14px; margin-bottom: 8px; }
    .report-card .rc-top { display: flex; justify-content: space-between; align-items: center; }
    .report-card .rc-game { font-size: 14px; font-weight: 700; }
    .report-card .rc-score { font-size: 14px; font-weight: 800; }
    .report-card .rc-date { font-size: 11px; color: var(--muted); margin-top: 2px; }
    .report-card .rc-bar { height: 4px; background: rgba(0,0,0,0.06); border-radius: 2px; margin-top: 6px; overflow: hidden; }
    .report-card .rc-fill { height: 100%; border-radius: 2px; }
    .reports-empty { text-align: center; color: var(--muted); font-size: 14px; padding: 30px 0; }
    .reports-footer { padding: 10px 20px 14px; border-top: 1px solid rgba(0,0,0,0.06); text-align: center; }
    .clear-reports-btn { background: none; border: none; color: #ef4444; font-size: 13px; font-weight: 700; cursor: pointer; padding: 6px 12px; }

    .install-banner {
      position: fixed; bottom: 0; left: 0; right: 0;
      background: rgba(0,0,0,0.85); color: #fff;
      padding: 14px 20px; text-align: center;
      font-size: 14px; z-index: 9999;
      backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px);
      display: none;
    }
    .install-banner b { color: #6ee7b7; }
    .install-banner .close-banner { position: absolute; top: 8px; right: 12px; color: #fff; background: none; border: none; font-size: 20px; cursor: pointer; }
  </style>
</head>
<body>
  <div class="app">
    <div class="screen active">
      <img src="rocket_book_logo.png" alt="Rocket Book logo" class="brand-logo" />
      <div class="app-title">Rocket Book Games</div>

      <div class="age-toggle-wrap">
        <div class="age-toggle" id="ageToggle">
          <label id="labelGrade" class="active" onclick="switchMode('grade')">
            <span class="toggle-emoji">&#x1F4DA;</span> 1st Grade
          </label>
          <label id="labelELC" onclick="switchMode('elc')">
            <span class="toggle-emoji">&#x1F423;</span> ELC
          </label>
          <div class="age-toggle-slider"></div>
        </div>
      </div>

      <div class="age-subtitle" id="ageSubtitle">Wonders Unit 5 Week 5</div>

      <div class="game-grid" id="gradeGames">
        <button class="game-tile tile-fast" onclick="window.location.href='fast.html'" type="button">
          <span class="tile-icon">&#x1F3CE;&#xFE0F;</span>
          <span class="tile-name">Fast &amp; Fluent</span>
          <span class="tile-desc">Read sentences aloud</span>
        </button>
        <button class="game-tile tile-rainbow" onclick="window.location.href='rainbow.html'" type="button">
          <span class="tile-icon">&#x1F308;</span>
          <span class="tile-name">Rainbow Reader</span>
          <span class="tile-desc">Sight word practice</span>
        </button>
        <button class="game-tile tile-spelling" onclick="window.location.href='spell.html'" type="button">
          <span class="tile-icon">&#x1F41D;</span>
          <span class="tile-name">Spelling Bee</span>
          <span class="tile-desc">Listen &amp; spell words</span>
        </button>
        <button class="game-tile tile-brain" onclick="window.location.href='learn.html'" type="button">
          <span class="tile-icon">&#x1F9E0;</span>
          <span class="tile-name">Brain Games</span>
          <span class="tile-desc">Vocabulary &amp; more</span>
        </button>
      </div>

      <div class="game-grid" id="elcGames" style="display:none;">
        <button class="game-tile tile-letters" onclick="window.location.href='letter_sounds.html'" type="button">
          <span class="tile-icon">&#x1F524;</span>
          <span class="tile-name">Letter Sounds</span>
          <span class="tile-desc">Tap what you hear</span>
        </button>
        <button class="game-tile tile-counting" onclick="window.location.href='counting.html'" type="button">
          <span class="tile-icon">&#x1F41B;</span>
          <span class="tile-name">Counting Critters</span>
          <span class="tile-desc">Count &amp; tap</span>
        </button>
        <button class="game-tile tile-shapes" onclick="window.location.href='shapes.html'" type="button">
          <span class="tile-icon">&#x1F4A0;</span>
          <span class="tile-name">Shape Builder</span>
          <span class="tile-desc">Match the shapes</span>
        </button>
        <button class="game-tile tile-colors" onclick="window.location.href='colors.html'" type="button">
          <span class="tile-icon">&#x1F3A8;</span>
          <span class="tile-name">Color Splash</span>
          <span class="tile-desc">Find the colors</span>
        </button>
      </div>

      <div class="footer">
        <button class="reports-btn" onclick="openReports()">&#x1F4CA; Reports</button>
        <div class="micro-note">
          Designed by
          <a class="credit-link" href="https://www.instagram.com/silvateaches/" target="_blank" rel="noopener noreferrer">CreativeSilva</a>
        </div>
      </div>
    </div>
  </div>

  <div class="reports-overlay" id="reportsOverlay" onclick="if(event.target===this)closeReports()">
    <div class="reports-modal">
      <div class="reports-header">
        <h2>&#x1F4CA; Reports</h2>
        <button class="reports-close" onclick="closeReports()">&times;</button>
      </div>
      <div class="reports-body scrollable" id="reportsBody"></div>
      <div class="reports-footer" id="reportsFooter" style="display:none;">
        <button class="clear-reports-btn" onclick="clearReports()">Clear All Reports</button>
      </div>
    </div>
  </div>

  <div class="install-banner" id="installBanner">
    <button class="close-banner" onclick="document.getElementById('installBanner').style.display='none';localStorage.setItem('bannerDismissed','1')">&times;</button>
    Tap <b>Share &#x2191;</b> then <b>Add to Home Screen</b> for the best experience!
  </div>

  <script>
    let currentMode = localStorage.getItem("rocketBookMode") || "grade";

    function switchMode(mode) {
      currentMode = mode;
      localStorage.setItem("rocketBookMode", mode);

      const toggle = document.getElementById("ageToggle");
      const gradeGames = document.getElementById("gradeGames");
      const elcGames = document.getElementById("elcGames");
      const subtitle = document.getElementById("ageSubtitle");
      const labelGrade = document.getElementById("labelGrade");
      const labelELC = document.getElementById("labelELC");

      if (mode === "elc") {
        toggle.classList.add("elc");
        labelGrade.classList.remove("active");
        labelELC.classList.add("active");
        gradeGames.style.display = "none";
        elcGames.style.display = "";
        subtitle.textContent = "Early Learning Center";
        elcGames.querySelectorAll(".game-tile").forEach(function(t, i) {
          t.style.animation = "none";
          t.offsetHeight;
          t.style.animation = "tileIn 0.35s ease forwards " + (0.04 + i * 0.06) + "s";
        });
      } else {
        toggle.classList.remove("elc");
        labelELC.classList.remove("active");
        labelGrade.classList.add("active");
        elcGames.style.display = "none";
        gradeGames.style.display = "";
        subtitle.textContent = "Wonders Unit 5 Week 5";
        gradeGames.querySelectorAll(".game-tile").forEach(function(t, i) {
          t.style.animation = "none";
          t.offsetHeight;
          t.style.animation = "tileIn 0.35s ease forwards " + (0.04 + i * 0.06) + "s";
        });
      }
    }

    if (currentMode === "elc") {
      switchMode("elc");
    }

    function openReports() {
      var reports = JSON.parse(localStorage.getItem('rocketBookReports') || '[]');
      var body = document.getElementById('reportsBody');
      var footer = document.getElementById('reportsFooter');
      if (!reports.length) {
        body.innerHTML = '<div class="reports-empty">No reports yet!<br>Play a game to see results here.</div>';
        footer.style.display = 'none';
      } else {
        footer.style.display = '';
        var html = '';
        var sorted = reports.slice().reverse();
        for (var i = 0; i < sorted.length; i++) {
          var rep = sorted[i];
          var pct = rep.total > 0 ? Math.round((rep.correct / rep.total) * 100) : 0;
          var color = pct >= 80 ? '#22c55e' : pct >= 50 ? '#f59e0b' : '#ef4444';
          var stars = pct === 100 ? ' ⭐' : '';
          var d = new Date(rep.date);
          var dateStr = d.toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
          var timeStr = d.toLocaleTimeString('en-US', { hour: 'numeric', minute: '2-digit' });
          html += '<div class="report-card"><div class="rc-top"><span class="rc-game">' + rep.game + '</span><span class="rc-score" style="color:' + color + '">' + rep.correct + '/' + rep.total + stars + '</span></div><div class="rc-date">' + dateStr + ' at ' + timeStr + '</div><div class="rc-bar"><div class="rc-fill" style="width:' + pct + '%;background:' + color + '"></div></div></div>';
        }
        body.innerHTML = html;
      }
      document.getElementById('reportsOverlay').classList.add('open');
    }
    function closeReports() { document.getElementById('reportsOverlay').classList.remove('open'); }
    function clearReports() { localStorage.removeItem('rocketBookReports'); openReports(); }

    document.addEventListener('touchmove', function(e) {
      if (!e.target.closest('.scrollable')) e.preventDefault();
    }, { passive: false });
    document.addEventListener('gesturestart', function(e) { e.preventDefault(); });
    document.addEventListener('gesturechange', function(e) { e.preventDefault(); });
    if (/iPhone|iPad/.test(navigator.userAgent) && !window.navigator.standalone && !localStorage.getItem('bannerDismissed')) {
      setTimeout(function() { document.getElementById('installBanner').style.display = 'block'; }, 2000);
    }
  </script>
</body>
</html>
