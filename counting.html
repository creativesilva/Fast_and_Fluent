<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, minimum-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Counting Critters" />
  <meta name="theme-color" content="#f0f0f5" />
  <link rel="apple-touch-icon" href="rocket_book_logo.png?v=12" />
  <link rel="icon" type="image/png" sizes="192x192" href="rocket_book_logo.png?v=12" />
  <title>Counting Critters</title>
  <style>
    :root {
      --bg: #f0f0f5; --glass: rgba(255,255,255,0.55); --glass-border: rgba(255,255,255,0.65);
      --glass-shadow: 0 8px 32px rgba(0,0,0,0.08); --text: #1a1a2e; --muted: #6b7085;
      --blur: 28px; --radius: 24px; --accent: rgba(52,211,153,0.85);
    }
    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; margin: 0; padding: 0; }
    html, body {
  width: 100%; height: 100%; height: 100dvh;
  overflow: hidden; position: fixed;
  touch-action: none;
}
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Helvetica Neue', Arial, sans-serif;
      color: var(--text); height: 100vh; height: 100dvh;
      display: flex; align-items: stretch; justify-content: center;
      padding: max(14px, env(safe-area-inset-top)) max(14px, env(safe-area-inset-right)) max(20px, env(safe-area-inset-bottom)) max(14px, env(safe-area-inset-left));
      user-select: none; -webkit-user-select: none; overflow: hidden;
      background:
        radial-gradient(ellipse at 20% 0%, rgba(110,231,183,0.28), transparent 50%),
        radial-gradient(ellipse at 80% 5%, rgba(52,211,153,0.22), transparent 45%),
        radial-gradient(ellipse at 50% 95%, rgba(251,191,36,0.16), transparent 40%),
        var(--bg);
    }
    .app, button, img { touch-action: manipulation; }
    .app {
      width: 100%; max-width: 420px; height: 100%;
      background: var(--glass); backdrop-filter: blur(var(--blur)) saturate(1.6);
      -webkit-backdrop-filter: blur(var(--blur)) saturate(1.6);
      border-radius: 0; box-shadow: var(--glass-shadow), inset 0 1px 0 rgba(255,255,255,0.6);
      padding: 20px 18px 24px 18px; display: flex; flex-direction: column; align-items: center;
      position: relative; overflow: hidden; border: 1px solid var(--glass-border);
    }
    .app::before {
      content: ""; position: absolute; inset: 0; pointer-events: none;
      background: linear-gradient(180deg, rgba(255,255,255,0.35) 0%, transparent 40%); border-radius: 36px;
    }
    .screen { display: none; flex-direction: column; flex: 1; overflow: hidden; width: 100%; align-items: center; justify-content: center; text-align: center; position: relative; z-index: 1; }
    .screen.active { display: flex; }
    .topbar { width: 100%; display: flex; align-items: center; justify-content: space-between; padding: 0 4px; margin-bottom: 8px; min-height: 36px; position: relative; z-index: 1; }
    .topbar-title { font-size: 15px; font-weight: 800; }
    .topbar-progress { font-size: 13px; font-weight: 700; color: var(--muted); }

    .home-icon { font-size: 64px; margin-bottom: 8px; }
    .home-title { font-size: clamp(28px, 8vw, 42px); font-weight: 900; margin-bottom: 4px; }
    .home-subtitle { font-size: 16px; font-weight: 600; color: var(--muted); margin-bottom: 20px; }

    /* Big number */
    .big-number {
      font-size: clamp(80px, 22vw, 120px); font-weight: 900; line-height: 1;
      color: #059669; text-shadow: 0 4px 20px rgba(16,185,129,0.25);
      margin-bottom: 4px;
      animation: letterPop 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
    }
    @keyframes letterPop { 0% { transform: scale(0.5); opacity: 0; } 100% { transform: scale(1); opacity: 1; } }

    .prompt-text { font-size: 16px; font-weight: 700; color: var(--muted); margin-bottom: 8px; min-height: 24px; }

    /* Counter display */
    .counter-display {
      display: flex; gap: 6px; justify-content: center; flex-wrap: wrap;
      margin-bottom: 14px; min-height: 28px; max-width: 300px;
    }
    .counter-pip {
      width: 22px; height: 22px; border-radius: 50%;
      background: rgba(0,0,0,0.08);
      transition: background 0.3s ease, transform 0.3s ease;
    }
    .counter-pip.filled {
      background: #10b981;
      transform: scale(1.2);
      box-shadow: 0 0 8px rgba(16,185,129,0.4);
    }

    /* Critter grid */
    .critter-grid {
      display: grid; grid-template-columns: repeat(5, 1fr);
      gap: 8px; width: 100%; max-width: 320px;
    }
    .critter-btn {
      border: none; outline: none; cursor: pointer;
      background: rgba(255,255,255,0.6); backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px);
      border-radius: 16px; padding: 10px 4px;
      font-size: 36px; line-height: 1;
      display: flex; align-items: center; justify-content: center;
      transition: transform 0.15s ease, opacity 0.3s ease;
      border: 2px solid rgba(0,0,0,0.03);
      box-shadow: 0 3px 10px rgba(0,0,0,0.05);
      position: relative; overflow: hidden;
    }
    .critter-btn::before {
      content: ""; position: absolute; inset: 0; pointer-events: none;
      background: linear-gradient(160deg, rgba(255,255,255,0.4) 0%, transparent 50%); border-radius: 16px;
    }
    .critter-btn:active { transform: scale(0.92); }
    .critter-btn.tapped {
      background: rgba(16,185,129,0.15); border-color: #10b981;
      transform: scale(1.05);
      box-shadow: 0 0 14px rgba(16,185,129,0.25);
    }
    .critter-btn.tapped .critter-check {
      display: block;
    }
    .critter-check {
      display: none; position: absolute; top: 2px; right: 4px;
      font-size: 14px;
    }

    .speaker-btn {
      border: none; outline: none; cursor: pointer;
      background: rgba(16,185,129,0.12); border-radius: 50%;
      width: 44px; height: 44px; display: flex; align-items: center; justify-content: center;
      font-size: 22px; margin-bottom: 10px;
      transition: transform 0.15s ease; border: 1px solid rgba(16,185,129,0.15);
    }
    .speaker-btn:active { transform: scale(0.9); }

    .glass-btn {
      border: none; outline: none; cursor: pointer;
      border-radius: 16px; padding: 14px 32px; font-size: 16px; font-weight: 800;
      backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px);
      transition: transform 0.12s ease; position: relative; overflow: hidden;
    }
    .glass-btn:active { transform: scale(0.96); }
    .glass-btn::before {
      content: ""; position: absolute; inset: 0; pointer-events: none;
      background: linear-gradient(160deg, rgba(255,255,255,0.4) 0%, transparent 50%); border-radius: 16px;
    }
    .btn-primary {
      background: linear-gradient(145deg, rgba(52,211,153,0.85), rgba(16,185,129,0.9));
      color: #fff; box-shadow: 0 6px 18px rgba(16,185,129,0.3); border: 1px solid rgba(110,231,183,0.4);
    }
    .btn-neutral { background: rgba(0,0,0,0.05); color: var(--text); box-shadow: 0 2px 8px rgba(0,0,0,0.06); border: 1px solid rgba(0,0,0,0.04); }
    .btn-row { display: flex; gap: 10px; margin-top: 16px; }

    .result-title { font-size: clamp(28px, 8vw, 44px); font-weight: 900; margin-bottom: 6px; }
    .result-stats { font-size: 17px; font-weight: 700; color: #10b981; margin-bottom: 6px; }
    .result-text { font-size: 14px; color: var(--muted); margin-bottom: 10px; max-width: 280px; }
    .celebration-img {
      width: min(44vw, 160px); height: auto; max-height: 160px;
      object-fit: cover; border-radius: 20px;
      box-shadow: 0 8px 24px rgba(0,0,0,0.12); margin-bottom: 8px;
    }

    @media (max-width: 390px) {
      .critter-grid { gap: 6px; max-width: 290px; }
      .critter-btn { font-size: 30px; padding: 8px 2px; border-radius: 14px; }
    }

    .install-banner {
      position: fixed; bottom: 0; left: 0; right: 0;
      background: rgba(0,0,0,0.85); color: #fff;
      padding: 14px 20px; text-align: center;
      font-size: 14px; z-index: 9999;
      backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px);
      display: none;
    }
    .install-banner b { color: #6ee7b7; }
    .install-banner .close-banner { position: absolute; top: 8px; right: 12px; color: #fff; background: none; border: none; font-size: 20px; cursor: pointer; }
  </style>
</head>
<body>
  <div class="app" id="app">
    <div class="topbar">
      <span class="topbar-title">Counting Critters</span>
      <span class="topbar-progress" id="topProgress"></span>
    </div>

    <div class="screen active" id="homeScreen">
      <div class="home-icon">&#x1F41B;</div>
      <div class="home-title">Counting Critters</div>
      <div class="home-subtitle">Tap to count the critters!</div>
      <button class="glass-btn btn-primary" id="startBtn" type="button">Let's Count!</button>
      <div class="btn-row">
        <button class="glass-btn btn-neutral" onclick="window.location.href='index.html'" type="button">Home</button>
      </div>
    </div>

    <div class="screen" id="gameScreen">
      <button class="speaker-btn" id="speakerBtn" type="button">&#x1F50A;</button>
      <div class="big-number" id="bigNumber">3</div>
      <div class="prompt-text" id="promptText">Tap 3 ladybugs!</div>
      <div class="counter-display" id="counterDisplay"></div>
      <div class="critter-grid" id="critterGrid"></div>
    </div>

    <div class="screen" id="finishScreen">
      <div class="result-title">Super Counter!</div>
      <div class="result-stats" id="resultStats"></div>
      <div class="result-text">You counted them all! Great job!</div>
      <img id="celebrationImg" class="celebration-img" src="giphy.gif" alt="Celebration" />
      <div class="btn-row">
        <button class="glass-btn btn-neutral" onclick="window.location.href='index.html'" type="button">Home</button>
        <button class="glass-btn btn-primary" id="playAgainBtn" type="button">Play Again</button>
      </div>
    </div>
  </div>

  <div class="install-banner" id="installBanner">
  <button class="close-banner" onclick="document.getElementById('installBanner').style.display='none';localStorage.setItem('bannerDismissed','1')">&times;</button>
  Tap <b>Share &#x2191;</b> then <b>Add to Home Screen</b> for the best experience!
</div>

  <audio id="correctSound" preload="auto"><source src="correct.mp3" type="audio/mpeg"></audio>
  <audio id="celebrationSound" preload="auto"><source src="celebration_sound.mp3" type="audio/mpeg"></audio>

  <script>
    const critterSets = [
      { target: "&#x1F41E;", targetName: "ladybugs", others: ["&#x1F98B;", "&#x1F41D;", "&#x1F40C;"] },
      { target: "&#x1F98B;", targetName: "butterflies", others: ["&#x1F41E;", "&#x1F41B;", "&#x1F422;"] },
      { target: "&#x1F438;", targetName: "frogs", others: ["&#x1F41E;", "&#x1F98B;", "&#x1F40C;"] },
      { target: "&#x1F422;", targetName: "turtles", others: ["&#x1F438;", "&#x1F41D;", "&#x1F41B;"] },
      { target: "&#x1F41D;", targetName: "bees", others: ["&#x1F422;", "&#x1F438;", "&#x1F98B;"] },
      { target: "&#x1F40C;", targetName: "snails", others: ["&#x1F41E;", "&#x1F41D;", "&#x1F438;"] },
    ];

    const ROUND_COUNT = 6;
    const GIPHY_API_KEY = "kIyJEsGiHN0LpmsNMaYm8SXyj4p2rZjm";
    const GIPHY_TAGS = ["great job animated cartoon", "gold star cartoon", "you did it animated", "confetti celebration animated", "thumbs up cartoon cute", "hooray cartoon", "super star animated sticker", "well done animated cute"];
    let giphyCache = [];

    let rounds = [];
    let roundIndex = 0;
    let tappedCount = 0;
    let targetCount = 0;
    let correctRounds = 0;

    const numberWords = ["", "one", "two", "three", "four", "five", "six", "seven", "eight", "nine", "ten"];
    const correctSound = document.getElementById("correctSound");
    const celebrationSound = document.getElementById("celebrationSound");

    let bestVoice = null;
    function findBestVoice() {
      const voices = window.speechSynthesis.getVoices();
      if (!voices.length) return;
      const prefs = ["samantha", "zoe", "karen", "fiona", "allison", "ava", "susan"];
      for (const pref of prefs) {
        const v = voices.find(v => v.name.toLowerCase().includes(pref) && v.lang.startsWith("en"));
        if (v) { bestVoice = v; return; }
      }
      const english = voices.filter(v => v.lang.startsWith("en") && !v.name.toLowerCase().includes("alex"));
      if (english.length) bestVoice = english[0];
    }
    if ("speechSynthesis" in window) {
      findBestVoice();
      window.speechSynthesis.onvoiceschanged = findBestVoice;
    }

    function speak(text, rate) {
      if (!("speechSynthesis" in window)) return;
      window.speechSynthesis.cancel();
      const u = new SpeechSynthesisUtterance(text);
      u.rate = rate || 0.8; u.pitch = 1.05; u.lang = "en-US";
      if (bestVoice) u.voice = bestVoice;
      window.speechSynthesis.speak(u);
    }

    function shuffle(arr) {
      for (let i = arr.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [arr[i], arr[j]] = [arr[j], arr[i]];
      }
      return arr;
    }

    async function preloadGiphyCache() {
      try {
        const tag = GIPHY_TAGS[Math.floor(Math.random() * GIPHY_TAGS.length)];
        const url = `https://api.giphy.com/v1/stickers/search?api_key=${GIPHY_API_KEY}&q=${encodeURIComponent(tag)}&rating=g&limit=25&offset=${Math.floor(Math.random() * 50)}`;
        const res = await fetch(url); const data = await res.json();
        if (data.data && data.data.length > 0) giphyCache = data.data.map(g => g.images.fixed_height.url);
      } catch (e) {}
    }
    async function getRandomCelebrationGif() {
      if (giphyCache.length > 0) {
        const gif = giphyCache.splice(Math.floor(Math.random() * giphyCache.length), 1)[0];
        if (giphyCache.length < 5) preloadGiphyCache();
        return gif;
      }
      try {
        const tag = GIPHY_TAGS[Math.floor(Math.random() * GIPHY_TAGS.length)];
        const url = `https://api.giphy.com/v1/stickers/random?api_key=${GIPHY_API_KEY}&tag=${encodeURIComponent(tag)}&rating=g`;
        const res = await fetch(url); const data = await res.json();
        if (data.data && data.data.images) return data.data.images.fixed_height.url;
      } catch (e) {}
      return "giphy.gif";
    }

    function showScreen(id) {
      document.querySelectorAll(".screen").forEach(s => s.classList.remove("active"));
      document.getElementById(id).classList.add("active");
    }

    function buildRounds() {
      rounds = [];
      const sets = shuffle([...critterSets]).slice(0, ROUND_COUNT);
      sets.forEach(set => {
        const count = 2 + Math.floor(Math.random() * 4); // 2-5
        rounds.push({ ...set, count });
      });
    }

    function buildCounter() {
      const el = document.getElementById("counterDisplay");
      el.innerHTML = "";
      for (let i = 0; i < targetCount; i++) {
        const pip = document.createElement("div");
        pip.className = "counter-pip" + (i < tappedCount ? " filled" : "");
        el.appendChild(pip);
      }
    }

    function showRound() {
      if (roundIndex >= ROUND_COUNT) { finishGame(); return; }

      const round = rounds[roundIndex];
      targetCount = round.count;
      tappedCount = 0;

      document.getElementById("topProgress").textContent = (roundIndex + 1) + " of " + ROUND_COUNT;
      document.getElementById("bigNumber").textContent = round.count;
      document.getElementById("bigNumber").style.animation = "none";
      requestAnimationFrame(() => { document.getElementById("bigNumber").style.animation = "letterPop 0.4s cubic-bezier(0.34, 1.56, 0.64, 1)"; });

      document.getElementById("promptText").textContent = "Tap " + round.count + " " + round.targetName + "!";
      buildCounter();

      // Build grid: target count + some others, total ~10
      const otherCount = 10 - round.count;
      let items = [];
      for (let i = 0; i < round.count; i++) items.push({ emoji: round.target, isTarget: true });
      for (let i = 0; i < otherCount; i++) items.push({ emoji: round.others[i % round.others.length], isTarget: false });
      items = shuffle(items);

      const grid = document.getElementById("critterGrid");
      grid.innerHTML = "";
      items.forEach(item => {
        const btn = document.createElement("button");
        btn.className = "critter-btn";
        btn.type = "button";
        btn.innerHTML = item.emoji + '<span class="critter-check">&#x2705;</span>';
        btn.addEventListener("click", () => handleCritterTap(btn, item));
        grid.appendChild(btn);
      });

      setTimeout(() => {
        speak("Can you find " + numberWords[round.count] + " " + round.targetName + "? Tap " + numberWords[round.count] + " " + round.targetName + "!", 0.8);
      }, 300);
    }

    function handleCritterTap(btn, item) {
      if (btn.classList.contains("tapped")) return;

      if (item.isTarget) {
        tappedCount++;
        btn.classList.add("tapped");
        speak(numberWords[tappedCount], 1.0);
        buildCounter();

        if (tappedCount >= targetCount) {
          correctRounds++;
          correctSound.currentTime = 0;
          correctSound.play().catch(() => {});
          document.getElementById("promptText").textContent = "You got them all!";
          speak("You found them all! Great counting!", 0.9);
          setTimeout(() => { roundIndex++; showRound(); }, 2000);
        }
      } else {
        btn.style.animation = "none";
        requestAnimationFrame(() => {
          btn.style.animation = "wrongShake 0.4s ease";
        });
        speak("Not that one! Try again!", 0.9);
      }
    }

    function finishGame() {
      document.getElementById("topProgress").textContent = "";
      document.getElementById("resultStats").textContent = correctRounds + " of " + ROUND_COUNT + " rounds completed!";
      getRandomCelebrationGif().then(src => { document.getElementById("celebrationImg").src = src; });
      showScreen("finishScreen");
      celebrationSound.currentTime = 0;
      celebrationSound.play().catch(() => {});
      speak("Super counter! You did an amazing job counting!", 0.9);
      try { const r=JSON.parse(localStorage.getItem('rocketBookReports')||'[]'); r.push({game:'Counting Critters',date:new Date().toISOString(),correct:correctRounds,total:ROUND_COUNT}); localStorage.setItem('rocketBookReports',JSON.stringify(r)); } catch(e){}
    }

    function startGame() {
      buildRounds(); roundIndex = 0; correctRounds = 0;
      showScreen("gameScreen"); showRound();
    }

    document.getElementById("speakerBtn").addEventListener("click", () => {
      if (roundIndex < rounds.length) {
        const r = rounds[roundIndex];
        speak("Find " + numberWords[r.count] + " " + r.targetName + "!", 0.8);
      }
    });
    document.getElementById("startBtn").addEventListener("click", startGame);
    document.getElementById("playAgainBtn").addEventListener("click", startGame);
    preloadGiphyCache();

    // Lock down touch for young children
    document.addEventListener('touchmove', function(e) {
      if (!e.target.closest('.scrollable')) e.preventDefault();
    }, { passive: false });
    document.addEventListener('gesturestart', function(e) { e.preventDefault(); });
    document.addEventListener('gesturechange', function(e) { e.preventDefault(); });
    // Show install banner on iOS Safari
    if (/iPhone|iPad/.test(navigator.userAgent) && !window.navigator.standalone && !localStorage.getItem('bannerDismissed')) {
      setTimeout(function() { document.getElementById('installBanner').style.display = 'block'; }, 2000);
    }
  </script>
  <style>
    @keyframes wrongShake {
      0%, 100% { transform: translateX(0); }
      20% { transform: translateX(-5px); }
      40% { transform: translateX(5px); }
      60% { transform: translateX(-3px); }
      80% { transform: translateX(3px); }
    }
  </style>
</body>
</html>
